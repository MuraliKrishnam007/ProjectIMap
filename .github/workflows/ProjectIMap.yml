name: Publish to NuGet

# Keyless publishing via NuGet Trusted Publishing (OIDC) — no API key is stored.
# This must match the nuget.org Trusted Publishing policy exactly:
#   Repository:    MuraliKrishnam007/ProjectIMap
#   Workflow File: ProjectIMap.yml   (filename only, WITH extension)
#   Environment:   production
#   Package owner / user: the nuget.org account that owns ProjectIMap
#
# Trigger it either by pushing a tag like v5.1.0, or from the Actions tab
# (Run workflow → workflow_dispatch).

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production        # required by the Trusted Publishing policy
    permissions:
      id-token: write              # required for the OIDC token exchange
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (8 runtime for net8.0 tests + 10 SDK)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore ProjectIMap/ProjectIMap.csproj

      - name: Test (all target frameworks)
        run: dotnet test ProjectIMap.Tests/ProjectIMap.Tests.csproj -c Release

      - name: Pack (Release)
        run: >
          dotnet pack ProjectIMap/ProjectIMap.csproj
          -c Release
          -p:GeneratePackageOnBuild=false
          -o ${{ github.workspace }}/artifacts

      - name: NuGet login (Trusted Publishing / OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: Murali_Krishnam    # ← must be your exact nuget.org username

      - name: Push to NuGet
        run: >
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
